name = "clawt-server"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "claw.cleaning", custom_domain = true },
  { pattern = "www.claw.cleaning", custom_domain = true },
