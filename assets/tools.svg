<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="claw.cleaning three MCP tools">
  <title>claw.cleaning MCP tools</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#064e3b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#f0fdfa">
    <!-- card 1 -->
    <rect x="60" y="175" width="300" height="280" rx="20" fill="rgba(240,253,250,0.08)" stroke="#f0fdfa" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="210" y="265" text-anchor="middle" font-size="24" font-weight="600">check_availability</text>
    <line x1="100" y1="295" x2="320" y2="295" stroke="#f0fdfa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="210" y="340" text-anchor="middle" font-size="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" fill-opacity="0.88">list open slots</text>
    <text x="210" y="370" text-anchor="middle" font-size="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" fill-opacity="0.88">8am–6pm pt, sf only</text>

    <!-- arrow 1 -->
    <g stroke="#f0fdfa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">
      <line x1="380" y1="315" x2="440" y2="315"/>
      <polyline points="425,300 440,315 425,330"/>
    </g>

    <!-- card 2 -->
    <rect x="450" y="175" width="300" height="280" rx="20" fill="rgba(240,253,250,0.08)" stroke="#f0fdfa" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="600" y="265" text-anchor="middle" font-size="24" font-weight="600">initiate_booking</text>
    <line x1="490" y1="295" x2="710" y2="295" stroke="#f0fdfa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="600" y="340" text-anchor="middle" font-size="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" fill-opacity="0.88">reserve the slot</text>
    <text x="600" y="370" text-anchor="middle" font-size="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" fill-opacity="0.88">calendar invite sent</text>

    <!-- arrow 2 -->
    <g stroke="#f0fdfa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">
      <line x1="770" y1="315" x2="830" y2="315"/>
      <polyline points="815,300 830,315 815,330"/>
    </g>

    <!-- card 3 -->
    <rect x="840" y="175" width="300" height="280" rx="20" fill="rgba(240,253,250,0.08)" stroke="#f0fdfa" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="990" y="265" text-anchor="middle" font-size="22" font-weight="600">check_booking_status</text>
    <line x1="880" y1="295" x2="1100" y2="295" stroke="#f0fdfa" stroke-opacity="0.25" stroke-width="1"/>
    <text x="990" y="340" text-anchor="middle" font-size="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" fill-opacity="0.88">list bookings by email</text>
    <text x="990" y="370" text-anchor="middle" font-size="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" fill-opacity="0.88">live from calendar</text>

    <!-- footer: pay on site -->
    <text x="600" y="540" text-anchor="middle" font-size="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" fill-opacity="0.75">pay the cleaner when they show up · $40/hr</text>

    <!-- wordmark -->
    <text x="600" y="585" text-anchor="middle" font-size="22" font-weight="600" letter-spacing="1">claw.cleaning</text>
  </g>
</svg>
